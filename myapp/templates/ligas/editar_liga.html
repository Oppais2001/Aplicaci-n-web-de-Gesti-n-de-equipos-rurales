{% extends 'layouts/base.html' %}

{% block content %}
<div class="ingresar">
  <div class="card-title">
    <h1>Editar Liga</h1>
  </div>
  <div class="card form-container">
    <form method="POST" enctype="multipart/form-data" class="form-registro">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Guardar cambios</button>
    </form>
  </div>
</div>

{% endblock %}
