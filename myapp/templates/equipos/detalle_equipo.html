{% extends 'layouts/base.html' %}

{% block content %}
<div>
    <h1>{{ equipo.nombre }} - Liga {{equipo.liga}}</h1>
        <form method="GET">
            <input type="text" name="buscar" placeholder="Buscar jugador...">
            <button type="submit">Buscar</button>
        </form>
        <br>
        <div class="tabla-container">
            <table>
                <tr class="encabezado">
                    <th>
                        Nombre
                    </th>
                    <th>
                        Rut
                    </th>
                    <th>
                        Fecha de <br> Inscripción
                    </th>
                    <th>
                        Acciones
                    </th>
                </tr>
                {% for jugador in jugadores %}
                    <tr>
                        <th>
                            {{jugador.nombre}}
                        </th>
                        <th>
                            {{jugador.rut}}
                        </th>
                        <th>
                            {{jugador.fecha_inscripcion}}
                        </th>
                        <th>
                            <button class="btn editar" title="Editar">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick='confirmarEliminar("{{ jugador.nombre }}","{{jugador.rut}}")'class="btn eliminar" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </th>
                    </tr>
                {% endfor %}
            </table>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function confirmarEliminar(nombre, rut) {
    console.log(nombre, rut)
    Swal.fire({
        title: '¿Estás seguro?',
        text: 'Eliminarás al Jugador "' + nombre + '"',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/jugadores/eliminar/" + rut + "/";
        }
    });
}
</script>
{% endblock %}
