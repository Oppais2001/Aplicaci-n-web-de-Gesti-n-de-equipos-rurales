{% extends 'layouts/base.html' %}

{% block content %}

<div class="ingresar">
    <div>
        <h1>Ingresar Equipo</h1>
    </div>
        <div class="container-forms-card">
            <div class="card form-container">
                <form method="POST" class="form-registro">
                    {% csrf_token %}
                    {{ form }}
                    <button>Guardar</button>
                </form>
            </div>
            <div>
                <div class="card">
                    <h2>¿No encuentras tu liga?</h2>
                    <p>Ingresala desde aquí, sin borrar los datos ya ingresados.
                        <button type="button" class="link-button enlace-ayuda" onclick="agregarLiga()">Haz click aquí.</button>
                    </p>
                </div>
                <br>
                <div class="card">
                <h2>Formato de las fechas</h2>
                    <p>Las fechas deben ser ingresadas con el formato DD/MM/AAAA</p>
                </div>
            </div>
        </div>
</div>

<script>

async function agregarLiga(){

    const { value: nombre } = await Swal.fire({

        title: 'Nueva Liga',

        input: 'text',

        inputPlaceholder:
            'Nombre de la liga',

        background: '#1f2937',

        color: '#fff',

        showCancelButton: true,

        confirmButtonText: 'Guardar',

        confirmButtonColor: 'brown',

        cancelButtonText: 'Cancelar',

        inputValidator: (value) => {

            if(!value.trim()){

                return 'Debes ingresar un nombre';
            }
        }
    });

    if(nombre){

        fetch('/ligas/ajax/crear/', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json',

                'X-CSRFToken': obtenerCSRFToken()
            },

            body: JSON.stringify({

                nombre: nombre
            })
        })

        .then(response => response.json())

        .then(data => {

            if(data.success){

                const select =
                    document.getElementById(
                        'id_liga'
                    );

                const option =
                    document.createElement(
                        'option'
                    );

                option.value = data.id;

                option.text = data.nombre;

                select.appendChild(option);

                select.value = data.id;

                Swal.fire({

                    icon: 'success',

                    title: 'Liga agregada',

                    timer: 1500,

                    showConfirmButton: false
                });

            } else {

                const mensaje = obtenerMensajeError(data);

                Swal.fire({

                    icon: 'error',

                    title: 'Error',

                    text: mensaje
                });
            }
        });
    }
}

function obtenerCSRFToken(){

    return document.querySelector(
        '[name=csrfmiddlewaretoken]'
    ).value;
}

function obtenerMensajeError(data){

    if(data.mensajes && data.mensajes.length){

        return data.mensajes.join('\n');
    }

    if(data.error){

        return data.error;
    }

    if(data.errores){

        return Object.values(data.errores)
            .flat()
            .join('\n');
    }

    return 'No se pudo crear la liga.';
}

</script>

{% endblock %}
