{% extends 'layouts/base.html' %}

{% block content %}
<div class="ingresar">
    <div class="card-title">
        <h1>Editar Equipo</h1>
    </div>
    <div class="container-forms-card">
        <div class="card form-container">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Guardar cambios</button>
            </form>
        </div>
        <div>
            <div class="card">
                <h2>¿Quieres cambiarlo a una nueva liga?</h2>
                <p>Ingresala desde aquí, sin borrar los datos ya ingresados. <a onclick="agregarLiga()">Haz click aquí.</a></p>
            </div>
        </div>
    </div>
</div>

<style>
   
    @media (orientation: landscape) {
        .ingresar {
            gap: 1rem;
        }
        .container-forms-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .form-registro label{
            font-size: 1.5rem;
        }
    }
    @media (max-width: 768px) {
        .form-registro label{
            font-size: 1rem;
        }
        .form-registro button {
            font-size: 1rem;
        }
    }
    @media (orientation: portrait) {
        .ingresar{
            gap: 0;
        }
        .container-forms-card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-registro label{
            font-size: 1rem;
        }
    }

</style>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

async function agregarLiga(){

    const { value: nombre } = await Swal.fire({

        title: 'Nueva Liga',

        input: 'text',

        inputPlaceholder:
            'Nombre de la liga',

        background: '#1f2937',

        color: '#fff',

        showCancelButton: true,

        confirmButtonText: 'Guardar',

        confirmButtonColor: 'brown',
        
        cancelButtonText: 'Cancelar',
        
        inputValidator: (value) => {

            if(!value.trim()){

                return 'Debes ingresar un nombre';
            }
        }
    });

    if(nombre){

        fetch('/ligas/ajax/crear/', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json',

                'X-CSRFToken': obtenerCSRFToken()
            },

            body: JSON.stringify({

                nombre: nombre
            })
        })

        .then(response => response.json())

        .then(data => {

            if(data.success){

                const select =
                    document.getElementById(
                        'id_liga'
                    );

                const option =
                    document.createElement(
                        'option'
                    );

                option.value = data.id;

                option.text = data.nombre;

                select.appendChild(option);

                select.value = data.id;

                Swal.fire({

                    icon: 'success',

                    title: 'Liga agregada',

                    timer: 1500,

                    showConfirmButton: false
                });

            } else {

                let mensaje = '';

                for(let campo in data.errores){

                    mensaje +=
                        data.errores[campo] + '\n';
                }

                Swal.fire({

                    icon: 'error',

                    title: 'Error',

                    text: mensaje
                });
            }
        });
    }
}

function obtenerCSRFToken(){

    return document.querySelector(
        '[name=csrfmiddlewaretoken]'
    ).value;
}

</script>
{% endblock %}
