{% extends 'layouts/base.html' %}

{% block content %}
<div class="ingresar">
    <div class="card-title">
        <h1>Editar Jugador</h1>
    </div>
    <div class="container-forms-card">
        <div class="card form-container">
            <form method="POST" class="form-registro">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Guardar cambios</button>
            </form>
        </div>
        <div>
            <div class="card">
                <h2>Ingreso Correcto</h2>
                <p>El ingreso correcto de la fecha debe respetar el formato "DD/MM/AA"</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
