{% extends 'layouts/base.html' %}

{% block content %}
<div class="ingresar">
    <div class="card-title">
        <h1>Ingresar Jugador</h1>
    </div>
    <div class="container-forms-card">
        <div class="card form-container">
            <form method="POST" class="form-registro">
                {% csrf_token %}
                {{ form }}
                <button>Guardar</button>
            </form>
        </div>
        <div>
            <div class="card">
                <h2>¿No encuentras algún equipo?</h2>
                <p>Ingresalo desde aquí, sin borrar los datos ya ingresados.
                    <button type="button" class="link-button enlace-ayuda" onclick="abrirPopupEquipo()">Haz click aquí.</button>
                </p>
            </div>
        </div>
    </div>
</div>

<script>

const opcionesLigas = `
    {% for liga in ligas %}
        <option value="{{ liga.id }}">
            {{ liga.nombre }}
        </option>
    {% endfor %}
`;

function abrirPopupEquipo(){

    Swal.fire({

        title: 'Agregar Equipo',

        html: `

            <input
                id="nombre_equipo"
                class="swal2-input"
                placeholder="Nombre equipo"
            >

            <select
                id="liga_equipo"
                class="swal2-select"
            >

                <option value="">
                    Seleccione una liga
                </option>

                ${opcionesLigas}

            </select>
        `,

        showCancelButton: true,

        confirmButtonText: 'Guardar',

        preConfirm: () => {

        const nombre =
            document.getElementById(
                'nombre_equipo'
            ).value.trim();

        const liga =
            document.getElementById(
                'liga_equipo'
            ).value;

        if(!nombre){

            Swal.showValidationMessage(
                'Debes ingresar un nombre'
            );

            return false;
        }

        if(!liga){

            Swal.showValidationMessage(
                'Debes seleccionar una liga'
            );

            return false;
        }

        return {
            nombre: nombre,
            liga: liga
        };
    }
    }).then((result) => {

        if(result.isConfirmed){

            guardarEquipo(result.value);
        }
    });
}

function guardarEquipo(datos){

    fetch('/equipos/crear/ajax/', {

        method: 'POST',

        headers: {

            'Content-Type':
                'application/json',

            'X-CSRFToken':
                obtenerCSRFToken()
        },

        body: JSON.stringify(datos)
    })

    .then(response => response.json())

    .then(data => {

        if(data.success){

            const selectEquipo =
                document.getElementById(
                    'id_equipo'
                );

            const option =
                document.createElement(
                    'option'
                );

            option.value = data.id;
            option.text = data.nombre;

            selectEquipo.appendChild(option);

            // seleccionarlo automáticamente
            selectEquipo.value = data.id;

            Swal.fire({

                icon: 'success',

                title: 'Equipo agregado'
            });

        } else {

            Swal.fire({

                icon: 'error',

                title: 'Error',

                text: data.error
            });
        }
    });
}

function obtenerCSRFToken(){

    let cookieValue = null;

    const cookies = document.cookie.split(';');

    for(let i = 0; i < cookies.length; i++){

        const cookie = cookies[i].trim();

        if(cookie.startsWith('csrftoken=')){

            cookieValue = cookie.substring(
                'csrftoken='.length
            );

            break;
        }
    }

    return cookieValue;
}

</script>

{% endblock %}
